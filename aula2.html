<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 02 JavaScript</title>
    
</head>
<body>
    <h1>Display</h1>
  <p id="demo">Vou sumir</p>
 <button type="button" onclick="document.getElementById('demo').style.display='none'">Sumir</button>
 <button type="button" onclick="document.getElementById('demo').style.display='block'">Aparecer</button>
<script>
document.getElementById("demo").innerHTML = "My First JavaScript";
</script>
</body>
</html>
